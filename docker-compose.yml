services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started


  postgres:
    image: postgres:16
    restart: unless-stopped

    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: userpass
      POSTGRES_DB: shortener

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d shortener"]
      interval: 5s
      timeout: 5s
      retries: 5



  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data


  nginx:
    image: nginx:1.24
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/frontend/dist:/usr/share/nginx/html:ro

    depends_on:
      - backend


volumes:
  postgres_data:
  redis_data:
