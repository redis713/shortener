services:
  backend:
    build: ./backend
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started


  postgres:
    image: postgres:16
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5



  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data


  nginx:
    build: ./frontend
    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      - backend


volumes:
  postgres_data:
  redis_data:
